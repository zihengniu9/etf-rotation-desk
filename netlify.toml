[build]
  command = "python scripts/build_static_site.py"
  publish = "dist"

[build.environment]
  PYTHON_VERSION = "3.11"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/outputs/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/web/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
