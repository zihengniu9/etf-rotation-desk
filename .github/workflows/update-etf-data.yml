name: Update ETF data

on:
  schedule:
    # A-share trading hours in Asia/Hong_Kong: 09:30-11:30 and 13:00-15:00.
    - cron: "30 1 * * 1-5"
    - cron: "0,30 2-3 * * 1-5"
    - cron: "0,30 5-6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: etf-dashboard
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: c4178e20-01e7-495b-b765-589b07fc93c4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh ETF outputs
        run: python run_etf_selector.py

      - name: Verify
        run: |
          PYTHONPATH=src python -m unittest discover -s tests -p "test_*.py"
          node tests/web_dashboard.test.js
          node tests/web_style.test.js
          node tests/deploy_config.test.js

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs
          if git diff --cached --quiet; then
            echo "No output changes to commit."
          else
            git commit -m "Update ETF data"
            git push
          fi

      - name: Build Netlify artifact
        run: python scripts/build_static_site.py

      - name: Check Netlify deployment secrets
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::Missing Netlify secrets. Set NETLIFY_AUTH_TOKEN in GitHub repository secrets so scheduled data updates can publish to Netlify."
            exit 1
          fi

      - name: Verify Netlify API access
        run: |
          set -euo pipefail
          user_response="$RUNNER_TEMP/netlify-user.json"
          site_response="$RUNNER_TEMP/netlify-site.json"

          user_status="$(curl --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --output "$user_response" --write-out "%{http_code}" \
            --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            --header "Accept: application/json" \
            "https://api.netlify.com/api/v1/user")"
          site_status="$(curl --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --output "$site_response" --write-out "%{http_code}" \
            --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            --header "Accept: application/json" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID")"

          echo "Netlify user endpoint HTTP $user_status"
          echo "Netlify site endpoint HTTP $site_status"
          python - "$user_status" "$site_status" "$user_response" "$site_response" "$NETLIFY_SITE_ID" <<'PY'
          import json
          import sys

          user_status, site_status, user_path, site_path, expected_site_id = sys.argv[1:]

          def read_payload(path):
              try:
                  with open(path, encoding="utf-8") as handle:
                      return json.load(handle)
              except (OSError, ValueError):
                  return {}

          user = read_payload(user_path)
          site = read_payload(site_path)

          if user_status != "200":
              message = user.get("message") or user.get("error") or "Netlify rejected the token"
              print(f"::error::Netlify token identity failed with HTTP {user_status}: {message}")
              raise SystemExit(1)

          print(f"Netlify user: {user.get('email', 'unknown')}")

          if site_status != "200":
              message = site.get("message") or site.get("error") or "Netlify rejected site access"
              print(f"::error::Netlify site access failed with HTTP {site_status}: {message}")
              raise SystemExit(1)

          actual_site_id = str(site.get("id") or site.get("site_id") or "")
          print(f"Netlify site: {site.get('name', 'unknown')} ({actual_site_id or 'unknown'})")
          if actual_site_id != expected_site_id:
              print(f"::error::Netlify returned unexpected site id: {actual_site_id or 'missing'}")
              raise SystemExit(1)
          PY

      - name: Deploy to Netlify
        run: npx -y netlify-cli@latest deploy --prod --dir=dist --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"
