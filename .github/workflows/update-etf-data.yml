name: Update ETF data

on:
  schedule:
    # A-share trading hours in Asia/Hong_Kong: 09:30-11:30 and 13:00-15:00.
    - cron: "30 1 * * 1-5"
    - cron: "0,30 2-3 * * 1-5"
    - cron: "0,30 5-6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

concurrency:
  group: etf-dashboard
  cancel-in-progress: false

jobs:
  update-data:
    permissions:
      contents: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh ETF outputs
        run: python run_etf_selector.py

      - name: Verify
        run: |
          PYTHONPATH=src python -m unittest discover -s tests -p "test_*.py"
          node tests/web_dashboard.test.js
          node tests/web_style.test.js
          node tests/deploy_config.test.js

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs
          if git diff --cached --quiet; then
            echo "No output changes to commit."
          else
            git commit -m "Update ETF data"
            git push
          fi

      - name: Build GitHub Pages artifact
        run: python scripts/build_static_site.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy-pages:
    needs: update-data
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
