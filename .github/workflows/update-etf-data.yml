name: Update ETF data

on:
  schedule:
    # A-share trading hours in Asia/Hong_Kong: 09:30-11:30 and 13:00-15:00.
    - cron: "30 1 * * 1-5"
    - cron: "0,30 2-3 * * 1-5"
    - cron: "0,30 5-6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: etf-dashboard
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID || 'c4178e20-01e7-495b-b765-589b07fc93c4' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh ETF outputs
        run: python run_etf_selector.py

      - name: Verify
        run: |
          PYTHONPATH=src python -m unittest discover -s tests -p "test_*.py"
          node tests/web_dashboard.test.js
          node tests/web_style.test.js
          node tests/deploy_config.test.js

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs
          if git diff --cached --quiet; then
            echo "No output changes to commit."
          else
            git commit -m "Update ETF data"
            git push
          fi

      - name: Build Netlify artifact
        run: python scripts/build_static_site.py

      - name: Check Netlify deployment secrets
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::Missing Netlify secrets. Set NETLIFY_AUTH_TOKEN in GitHub repository secrets so scheduled data updates can publish to Netlify."
            exit 1
          fi

      - name: Deploy to Netlify
        run: npx -y netlify-cli@latest deploy --prod --dir=dist --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"
